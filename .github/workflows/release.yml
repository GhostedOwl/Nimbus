name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-windows
          path: target/release/nimbus.exe

  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libappindicator3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build deb
        run: cargo deb
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-deb
          path: target/debian/*.deb

  build-rpm-rhel:
    runs-on: ubuntu-22.04
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          dnf install -y \
            rust cargo \
            gtk3-devel \
            libappindicator-gtk3-devel \
            xdotool-devel \
            openssl-devel
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm
      - name: Build
        run: cargo build --release
      - name: Build rpm
        run: cargo generate-rpm
      - name: Rename artifact
        run: mv target/generate-rpm/*.rpm target/generate-rpm/nimbus-rhel.rpm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-rpm-rhel
          path: target/generate-rpm/nimbus-rhel.rpm

  build-rpm-opensuse:
    runs-on: ubuntu-22.04
    container: opensuse/tumbleweed
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          zypper refresh
          zypper install -y \
            rust cargo \
            gtk3-devel \
            typelib-1_0-AyatanaAppIndicator3-0_1 \
            libayatana-appindicator3-devel \
            openssl-devel
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm
      - name: Build
        run: cargo build --release
      - name: Build rpm
        run: cargo generate-rpm
      - name: Rename artifact
        run: mv target/generate-rpm/*.rpm target/generate-rpm/nimbus-opensuse.rpm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-rpm-opensuse
          path: target/generate-rpm/nimbus-opensuse.rpm

  release:
    needs: [build-windows, build-deb, build-rpm-rhel, build-rpm-opensuse]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nimbus-windows/nimbus.exe
            nimbus-deb/*.deb
            nimbus-rpm-rhel/nimbus-rhel.rpm
            nimbus-rpm-opensuse/nimbus-opensuse.rpm
          generate_release_notes: true
